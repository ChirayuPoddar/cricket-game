<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Cricket Game</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/cannon.js"></script>
</head>
<video id="webcamOverlay" autoplay playsinline></video>

<style>
  #webcamOverlay {
    position: fixed;
    bottom: 20px;       /* Puts it 20px up from the bottom edge */
    right: 20px;        /* Puts it 20px in from the right edge */
    width: 240px;       /* Width of your corner window */
    height: 180px;      /* Height of your corner window */
    object-fit: cover;  /* Prevents the camera feed from stretching squished */
    border-radius: 12px;/* Gives it nice, modern rounded corners */
    border: 3px solid #00ff00; /* Neon green matching your tracking theme */
    box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5); /* Drop shadow so it stands out */
    z-index: 9999;      /* Forces it to stay on top of the BabylonJS canvas */
    transform: scaleX(-1); /* Mirrors the feed so left-is-left and right-is-right */
  }
</style>
<body>
    <canvas id="renderCanvas"></canvas>

    <script type="module">
        // 1. Import Core Engine Architecture Modules
        import { GameEngine } from './src/core/engine.js';
        import { GameScene } from './src/core/scene.js';

        // 2. Import All Environment/Scenery Modules
        import EnvironmentCamera from './src/environment/camera.js';
        import EnvironmentLights from './src/environment/lights.js';
        import EnvironmentSky from './src/environment/sky.js';
        import EnvironmentGround from './src/environment/ground.js';
        import EnvironmentWickets from './src/environment/wickets.js';
        import EnvironmentHand from './src/environment/hand.js';
    import EnvironmentBall from './src/environment/ball.js';
        import EnvironmentStadium from './src/environment/stadium.js'; 
        
        // Upgraded Scoreboard UI Import
        import GameUI from './src/ui/scoreboard.js'; 

        window.addEventListener("DOMContentLoaded", () => {
            console.log("Unified Master Bootstrapper Active!");

            const gameEngineModule = new GameEngine("renderCanvas");
            const engine = gameEngineModule.initialize();

            const gameSceneModule = new GameScene(engine);
            const scene = gameSceneModule.create();

            const cameraModule = new EnvironmentCamera(scene, gameEngineModule.canvas);
            cameraModule.setup();

            const lightsModule = new EnvironmentLights(scene);
            const lightingAssets = lightsModule.setup();

            const skyModule = new EnvironmentSky(scene);
            skyModule.setup();

            const groundModule = new EnvironmentGround(scene);
            groundModule.setup();

            // Initialize and mount the Stadium Scenery
            const stadiumModule = new EnvironmentStadium(scene);
            stadiumModule.setup();

            // Initialize and mount the Upgraded Scoreboard Dashboard
            const uiModule = new GameUI();
            uiModule.setup();

            const wicketsModule = new EnvironmentWickets(scene, lightingAssets.shadowGenerator);
            wicketsModule.setup();

            const handModule = new EnvironmentHand(scene);
            const handGroup = handModule.setup();

            const ballModule = new EnvironmentBall(scene, lightingAssets.shadowGenerator);
            ballModule.setup(handGroup, wicketsModule, uiModule, cameraModule);

            gameEngineModule.startRenderLoop(scene);
        });
    </script>
</body>
</html>
